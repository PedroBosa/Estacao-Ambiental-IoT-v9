<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estação IoT - Documentação Reader</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Highlight.js for Code -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="mobile-header glass">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="22" height="22" stroke="url(#gradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="gradient-mobile" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#38BDF8" />
                        <stop offset="100%" stop-color="#818CF8" />
                    </linearGradient>
                </defs>
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            <span style="font-size: 1.1rem;">Docs Viewer</span>
        </div>
        <button id="menu-toggle" aria-label="Menu">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
    </header>

    <aside id="sidebar" class="glass hidden-mobile">
        <div class="sidebar-header">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="28" height="28" stroke="url(#gradient)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#38BDF8" />
                            <stop offset="100%" stop-color="#818CF8" />
                        </linearGradient>
                    </defs>
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                <span>Docs Viewer</span>
            </div>
        </div>
        <div class="sidebar-content">
            <div class="toc-title">NESTA PÁGINA</div>
            <nav id="toc"></nav>
        </div>
    </aside>

    <main id="main">
        <div class="content-wrapper">
            <div id="loading" class="loading-spinner"></div>
            <article id="content" class="markdown-body glass"></article>
        </div>
    </main>
    <div id="mobile-overlay" class="hidden"></div>
    
    <script src="app.js"></script>
</body>
</html>
